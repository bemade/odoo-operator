# Default values for odoo-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Operator deployment configuration
operator:
  # Operator container image (include the tag, e.g. registry.bemade.org/bemade/odoo-operator:v0.12.0)
  image: ghcr.io/bemade/odoo-operator
  # Resource limits and requests for the operator
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  # Node placement
  affinity: {}
  tolerations: []

# Image pull secrets for private registries
imagePullSecrets:
  - domain: registry.bemade.org
    username: username
    password: password


# ── Pre-flight migration gate (1.9.0) ─────────────────────────────────────────
# Starting with 1.9.0 the operator consumes `spec.environment` on OdooInstances
# and rewrites `ir_mail_server` on staging refreshes / restores.  Every
# pre-1.9 OdooInstance has no environment field and will be treated as
# Staging by default — which means their ir_mail_server gets rewritten to
# Mailpit (or disabled) on the next refresh/restore.
#
# Set this to `true` after you've explicitly tagged every production
# OdooInstance with `spec.environment: Production`.  See
# charts/odoo-operator/templates/_preflight.tpl for a migration script.
productionInstancesIdentified: false

# Default configuration applied by the operator when an OdooInstance does not
# specify these fields. These are cluster-specific values that vary per installation.
defaults:
  # Default Odoo container image when spec.image is not set.
  odooImage: "odoo:18.0"
  # Default StorageClass for filestore PVCs when spec.filestore.storageClass is not set.
  storageClass: "standard"
  # Default PVC size for filestore when spec.filestore.storageSize is not set.
  storageSize: "2Gi"
  # Default IngressClass when spec.ingress.class is not set. Leave empty to omit the annotation.
  ingressClass: ""
  # Default cert-manager ClusterIssuer when spec.ingress.issuer is not set.
  ingressIssuer: ""
  # Default Gateway API Gateway name for HTTPRoute parentRef.
  # When both gatewayRefName and gatewayRefNamespace are non-empty,
  # instances without an explicit gatewayRef get one automatically (creates
  # HTTPRoute instead of Ingress).
  gatewayRefName: ""
  # Default Gateway API Gateway namespace for HTTPRoute parentRef.
  gatewayRefNamespace: ""
  # Default CPU/memory resource requests and limits for Odoo pods.
  resources:
    requests:
      cpu: 400m
      memory: 256Mi
    limits:
      cpu: 2000m
      memory: 4Gi
  # Default node affinity for Odoo pods.
  affinity: {}
  # Default tolerations for Odoo pods.
  tolerations: []

  # Mail server defaults injected into staging OdooInstances after neutralize.
  # Staging instances get the `bemade.org/environment=staging` pod label,
  # which a cluster NetworkPolicy (typically Calico) uses to deny egress to
  # real SMTP/IMAP endpoints.  Pointing them at an in-cluster Mailpit gives
  # developers a harmless place for mail to land.  Leave stagingSmtpHost
  # empty to skip the auto-configuration — staging instances will then run
  # with the neutralize sentinel (smtp_host=invalid, no outbound mail).
  mail:
    # Hostname of the Mailpit (or any SMTP sink) service staging instances
    # should use for outbound mail.  Example:
    # `mailpit.mailpit.svc.cluster.local`
    stagingSmtpHost: ""
    stagingSmtpPort: 1025
    stagingSmtpEncryption: "none"   # "none" | "ssl" | "starttls"

# Validating webhook configuration
webhook: {}

# Odoo Manager ServiceAccount (for external Odoo instances to manage the cluster)
odooManager:
  # Enable creation of ServiceAccount and RBAC for Odoo manager
  enabled: false
  # ServiceAccount name
  serviceAccountName: "odoo-manager"

# PostgreSQL cluster configuration
# Reference an existing secret containing the cluster configuration.
# The secret must contain a clusters.yaml key with YAML content like:
#
#   main:
#     host: "postgres.postgres.svc.cluster.local"
#     port: 5432
#     adminUser: "postgres"
#     adminPassword: "secret"
#     default: true
#   analytics:
#     host: "analytics-db.database.svc.cluster.local"
#     port: 5432
#     adminUser: "postgres"
#     adminPassword: "secret"
#     default: false
#
# Exactly one cluster must have 'default: true'.
# Create the secret before installing the chart:
#   kubectl create secret generic postgres-clusters -n odoo-operator \
#     --from-file=clusters.yaml=my-clusters.yaml
postgresClustersSecretRef:
  name: ""  # Required: name of the secret containing clusters.yaml
